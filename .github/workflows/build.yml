name: Build NexTV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: gradle

      - name: Download gradle-wrapper.jar if missing
        run: |
          JAR=gradle/wrapper/gradle-wrapper.jar
          if [ ! -f "$JAR" ] || [ ! -s "$JAR" ]; then
            echo "Downloading gradle-wrapper.jar..."
            mkdir -p gradle/wrapper
            curl -L -o "$JAR" \
              "https://github.com/gradle/gradle/raw/v7.5.0/gradle/wrapper/gradle-wrapper.jar"
            echo "Downloaded: $(du -sh $JAR)"
          else
            echo "gradle-wrapper.jar already exists"
          fi

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Release APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: NexTV-Release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Upload Debug APK artifact
        uses: actions/upload-artifact@v3
        with:
          name: NexTV-Debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 7

      - name: Get version & tag
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        id: ver
        run: |
          VER=$(grep 'versionName' app/build.gradle | head -1 | grep -oP '"\K[^"]+')
          TAG="v${VER}-$(date +'%Y%m%d%H%M')"
          echo "VER=$VER"  >> $GITHUB_OUTPUT
          echo "TAG=$TAG"  >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "NexTV ${{ steps.ver.outputs.TAG }}"
          body: |
            ## 📺 NexTV Android TV App

            Build otomatis · commit: `${{ github.sha }}`

            ### ⬇️ Download & Install
            1. Download **NexTV-Release.apk** di bawah
            2. Copy ke USB / transfer ke TV Box
            3. Aktifkan **Unknown Sources** di Settings TV Box
            4. Install APK → Buka NexTV
            5. Channel otomatis ter-load dari server 🎉

            ### Requirement
            - Android 5.0+ (Lollipop ke atas)
            - Koneksi internet
          files: |
            app/build/outputs/apk/release/*.apk
            app/build/outputs/apk/debug/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
