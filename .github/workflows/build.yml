name: Build NexTV APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "7.5"

      - name: Generate debug keystore
        run: |
          mkdir -p $HOME/.android
          keytool -genkeypair \
            -keystore $HOME/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US" \
            -noprompt

      - name: Fix gradlew permissions
        run: chmod +x gradlew

      - name: Build Release APK
        run: gradle assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NexTV-Release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Get version & tag
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        id: ver
        run: |
          VER=$(grep 'versionName' app/build.gradle | head -1 | grep -oP '"\K[^"]+')
          TAG="v${VER}-$(date +'%Y%m%d%H%M')"
          echo "TAG=$TAG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.TAG }}
          name: "NexTV ${{ steps.ver.outputs.TAG }}"
          body: |
            ## 📺 NexTV Android TV App
            ### ⬇️ Download & Install
            1. Download **NexTV-v1.0.0.apk**
            2. Transfer ke TV Box → Aktifkan Unknown Sources → Install 🎉
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
